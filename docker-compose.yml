services:
  db:
    image: postgres:16
    container_name: news_etl_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # [추가] SQLAlchemy 엔진이 참조할 전체 접속 URL
      DATABASE_URL: ${DATABASE_URL}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    build: ./ai
    container_name: news_etl_ai
    restart: unless-stopped
    env_file: .env # .env의 모델명 변수를 자동으로 가져옵니다.
    environment:
      TZ: Asia/Seoul
      TRANSFORMERS_CACHE: /models
      HF_HOME: /models
      # 코드에서 os.getenv로 읽을 수 있게 매핑합니다.
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
      SENTIMENT_MODEL: ${SENTIMENT_MODEL}
    expose:
      - "8001"
    volumes:
      - model_cache:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"] # 포트 번호 8001 확인!
      interval: 20s # 체크 간격
      timeout: 10s # 응답 대기 시간
      retries: 10 # 모델이 무거우니 재시도 횟수를 넉넉히 (10번이면 약 3분 대기)
      start_period: 60s # 컨테이너 시작 후 모델 로딩을 위한 초기 대기 시간
    depends_on:
      db:
        condition: service_healthy

  collector:
    build: ./collector
    container_name: news_etl_collector
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: ${DATABASE_URL}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy

  api:
    build: ./api
    container_name: news_etl_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Seoul
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: news_etl_pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LISTEN_PORT}
    ports:
      - "${PGADMIN_LISTEN_PORT}:${PGADMIN_LISTEN_PORT}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
  pgadmin_data:
