services:
  db:
    image: postgres:16
    container_name: news_etl_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: news_etl_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT: ${PGADMIN_LISTEN_PORT}
    ports:
      - "${PGADMIN_LISTEN_PORT}:${PGADMIN_LISTEN_PORT}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: news_etl_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      MODEL_CACHE_DIR: /models
      TRANSFORMERS_CACHE: /models
      HF_HOME: /models
    expose:
      - "8001"
    volumes:
      - model_cache:/models
    depends_on:
      db:
        condition: service_healthy

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: news_etl_collector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AI_SERVICE_URL: http://ai:8001
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: news_etl_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  model_cache:
  pgadmin_data:
